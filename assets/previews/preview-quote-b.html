<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote — Opção B</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0e0e12; color: #f0f0f5; font-family: 'DM Sans', sans-serif; }

.mock-hero {
  background: #0e0e12;
  padding: 60px 40px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 0.85rem;
  color: #8888aa;
  letter-spacing: 0.05em;
}

/* OPÇÃO B — Border-left azul, alinhado à esquerda, container */
.quote-band {
  background: #0e0e12;
  padding: 64px 40px;
}

.quote-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 48px;
}

.quote-accent {
  width: 3px;
  height: 100px;
  background: linear-gradient(180deg, #353cdd, rgba(53,60,221,0.1));
  flex-shrink: 0;
  border-radius: 3px;
}

blockquote {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  font-weight: 700;
  line-height: 1.3;
  color: #f0f0f5;
  letter-spacing: -0.02em;
}

blockquote em {
  font-style: italic;
  font-weight: 400;
  color: #353cdd;
}

.mock-next {
  background: #16161c;
  padding: 60px 40px;
  text-align: center;
  font-size: 0.85rem;
  color: #8888aa;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<div class="mock-hero">↑ Hero section (fundo escuro)</div>

<!-- OPÇÃO B -->
<div class="quote-band">
  <div class="quote-inner">
    <div class="quote-accent"></div>
    <blockquote>
      "Se competes por preço, vais sempre perder<br>
      para alguém <em>mais desesperado</em> do que tu."
    </blockquote>
  </div>
</div>

<div class="mock-next">↓ Secção seguinte (fundo surface)</div>

</body>
</html>
