<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote — Opção A</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0e0e12; color: #f0f0f5; font-family: 'DM Sans', sans-serif; }

/* Simula secção anterior (hero) */
.mock-hero {
  background: #0e0e12;
  padding: 60px 40px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 0.85rem;
  color: #8888aa;
  letter-spacing: 0.05em;
}

/* OPÇÃO A — Fundo escuro, texto enorme, subtil */
.quote-band {
  background: #0e0e12;
  padding: 72px 40px;
  position: relative;
  border-top: 1px solid rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.quote-band::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 1px; height: 48px;
  background: rgba(53,60,221,0.5);
  top: -24px;
}

.quote-inner {
  max-width: 820px;
  margin: 0 auto;
  text-align: center;
}

blockquote {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: clamp(1.6rem, 3.5vw, 2.5rem);
  font-weight: 400;
  line-height: 1.3;
  color: #e0e0ea;
  font-style: italic;
  letter-spacing: -0.01em;
}

blockquote em {
  font-style: normal;
  font-weight: 800;
  color: #ffffff;
}

/* Simula secção seguinte */
.mock-next {
  background: #16161c;
  padding: 60px 40px;
  text-align: center;
  font-size: 0.85rem;
  color: #8888aa;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<div class="mock-hero">↑ Hero section (fundo escuro)</div>

<!-- OPÇÃO A -->
<div class="quote-band">
  <div class="quote-inner">
    <blockquote>
      "Se competes por preço, vais sempre perder<br>
      para alguém <em>mais desesperado</em> do que tu."
    </blockquote>
  </div>
</div>

<div class="mock-next">↓ Secção seguinte (fundo surface)</div>

</body>
</html>
